name: Create Planning Sub-Issues

on:
  workflow_dispatch:
    inputs:
      parent_issue:
        description: 'Parent issue number (default: 122)'
        required: false
        default: '122'

permissions:
  issues: write

jobs:
  create-sub-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Area F sub-issue (global parent)
        id: area_f
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('.github/issue-plans/area-f-cross-cutting.md', 'utf8');
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Area F: Cross-Cutting Concerns – Design Questions (answer first)',
              body: body,
              labels: ['planning', 'questions-needed'],
            });
            console.log(`Created Area F issue: #${issue.data.number}`);
            core.setOutput('issue_number', issue.data.number);
            core.setOutput('issue_node_id', issue.data.node_id);
            return issue.data.number;

      - name: Link Area F as sub-issue of parent (#${{ github.event.inputs.parent_issue }})
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const parentNumber = parseInt('${{ github.event.inputs.parent_issue }}');
            const childNumber = parseInt('${{ steps.area_f.outputs.issue_number }}');

            // Get node IDs for GraphQL sub-issue linking
            const parent = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
            });
            const child = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: childNumber,
            });

            try {
              await github.graphql(`
                mutation AddSubIssue($parentId: ID!, $childId: ID!) {
                  addSubIssue(input: { issueId: $parentId, subIssueId: $childId }) {
                    issue { number }
                    subIssue { number }
                  }
                }
              `, { parentId: parent.data.node_id, childId: child.data.node_id });
              console.log(`Linked #${childNumber} as sub-issue of #${parentNumber}`);
            } catch (e) {
              console.log(`Note: sub-issue linking via GraphQL not available; adding comment instead. Error: ${e.message}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parentNumber,
                body: `Sub-issue created: #${childNumber} (Area F: Cross-Cutting Concerns)`,
              });
            }

      - name: Create Area E sub-issue
