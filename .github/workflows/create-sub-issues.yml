                    issue { number }
                    subIssue { number }
                  }
                }
              `, { parentId: parent.data.node_id, childId: child.data.node_id });
              console.log(`Linked #${issue.data.number} as sub-issue of #${areaFNumber}`);
            } catch (e) {
              console.log(`Note: sub-issue linking not available. Error: ${e.message}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: areaFNumber,
