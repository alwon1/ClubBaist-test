              labels: ['planning', 'questions-needed'],
            });
            console.log(`Created Area E issue: #${issue.data.number}`);
            core.setOutput('issue_number', issue.data.number);

            // Link as sub-issue of Area F
            const parent = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: areaFNumber,
            });
            const child = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.data.number,
            });
            try {
              await github.graphql(`
                mutation AddSubIssue($parentId: ID!, $childId: ID!) {
