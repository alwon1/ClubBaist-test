name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Cache SQL Server Docker image
        id: cache-sqlserver
        uses: actions/cache@v4
        with:
          path: /tmp/sqlserver-image.tar
          key: docker-sqlserver-2022-latest

      - name: Load SQL Server Docker image from cache
        if: steps.cache-sqlserver.outputs.cache-hit == 'true'
        run: docker load -i /tmp/sqlserver-image.tar

      - name: Pull and cache SQL Server Docker image
        if: steps.cache-sqlserver.outputs.cache-hit != 'true'
        run: |
          docker pull mcr.microsoft.com/mssql/server:2022-latest
          docker save mcr.microsoft.com/mssql/server:2022-latest -o /tmp/sqlserver-image.tar

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ClubBaist.slnx

      - name: Build
        run: dotnet build ClubBaist.slnx --no-restore

      - name: Test
        run: dotnet test ClubBaist.slnx --no-build --no-restore
