services:
  compose-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  sql:
    image: "mcr.microsoft.com/mssql/server:2022-latest"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_PASSWORD}"
    expose:
      - "1433"
    networks:
      - "aspire"
  seeder:
    image: "${SEEDER_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ConnectionStrings__clubbaist: "Server=sql,1433;User ID=sa;Password=${SQL_PASSWORD};TrustServerCertificate=true;Initial Catalog=clubbaist"
      CLUBBAIST_HOST: "sql"
      CLUBBAIST_PORT: "1433"
      CLUBBAIST_USERNAME: "sa"
      CLUBBAIST_PASSWORD: "${SQL_PASSWORD}"
      CLUBBAIST_URI: "mssql://sa:${SQL_PASSWORD}@sql:1433/clubbaist"
      CLUBBAIST_JDBCCONNECTIONSTRING: "jdbc:sqlserver://sql:1433;databaseName=clubbaist;trustServerCertificate=true"
      CLUBBAIST_DATABASENAME: "clubbaist"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "seeder"
    depends_on:
      sql:
        condition: "service_started"
    networks:
      - "aspire"
  web:
    image: "${WEB_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${WEB_PORT}"
      ConnectionStrings__clubbaist: "Server=sql,1433;User ID=sa;Password=${SQL_PASSWORD};TrustServerCertificate=true;Initial Catalog=clubbaist"
      CLUBBAIST_HOST: "sql"
      CLUBBAIST_PORT: "1433"
      CLUBBAIST_USERNAME: "sa"
      CLUBBAIST_PASSWORD: "${SQL_PASSWORD}"
      CLUBBAIST_URI: "mssql://sa:${SQL_PASSWORD}@sql:1433/clubbaist"
      CLUBBAIST_JDBCCONNECTIONSTRING: "jdbc:sqlserver://sql:1433;databaseName=clubbaist;trustServerCertificate=true"
      CLUBBAIST_DATABASENAME: "clubbaist"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "web"
    ports:
      - "${WEB_PORT}"
    depends_on:
      seeder:
        condition: "service_started"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
